name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }} \
            --build-arg VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }} \
            --build-arg VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }} \
            -t portfolio:latest \
            -t portfolio:${{ github.sha }} \
            .

      - name: Deploy container
        run: |
          docker stop portfolio 2>/dev/null || true
          docker rm portfolio 2>/dev/null || true
          docker run -d \
            --name portfolio \
            --restart unless-stopped \
            -p 8080:80 \
            portfolio:latest
          docker image prune -f
